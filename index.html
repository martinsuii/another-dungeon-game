<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Another Dungeon Game</title>
    <link rel="icon" type="image/png" href="icons/sword.png">
    
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #game-layout { display: flex; align-items: flex-start; gap: 20px; position: relative; }
        .sidebar { background: #252525; padding: 15px; border: 2px solid #444; width: 160px; height: 400px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        #stage-container { display: flex; flex-direction: column; gap: 10px; }
        #stage { position: relative; width: 600px; height: 400px; cursor: crosshair; }
        canvas { border: 4px solid #444; background: #000; image-rendering: pixelated; display: block; }
        
        .info-bar { background: #222; border: 2px solid #444; height: 40px; display: flex; align-items: center; justify-content: space-around; font-weight: bold; font-size: 14px; }
        
        .overlay-layer { position: absolute; top: 0; left: 0; width: 600px; height: 400px; display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        .ui-panel { background: rgba(0,0,0,0.95); width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #444; pointer-events: auto; text-align: center; padding: 20px; box-sizing: border-box; }
        
        .hot-slot { width: 60px; height: 60px; background: #111; border: 2px solid #444; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .hot-slot img { width: 40px; height: 40px; image-rendering: pixelated; }
        .durability-bg { position: absolute; top: -8px; width: 100%; height: 5px; background: #444; border: 1px solid #000; }
        .durability-fill { height: 100%; background: #0af; width: 0%; transition: width 0.2s; }
        
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        button { background: #444; color: white; border: 1px solid #666; padding: 8px; cursor: pointer; font-family: inherit; }
        button:hover { background: #555; border-color: #0f0; }

        #footer-ui { width: 810px; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .github-icon { width: 32px; height: 32px; image-rendering: pixelated; transition: opacity 0.2s; }
        .github-icon:hover { opacity: 0.7; }

        #info-trigger { 
            width: 30px; height: 30px; border-radius: 50%; border: 2px solid #888; 
            display: flex; align-items: center; justify-content: center; 
            cursor: help; position: relative; font-weight: bold; color: #888;
        }
        #info-trigger:hover { border-color: #0af; color: #0af; }
        #controls-tooltip { 
            position: absolute; bottom: 40px; left: -85px; width: 200px; 
            background: rgba(0,0,0,0.95); border: 2px solid #0af; padding: 10px; 
            color: #fff; font-size: 11px; text-align: left;
            visibility: hidden; opacity: 0; transition: 0.2s; pointer-events: none;
            z-index: 200;
        }
        #info-trigger:hover #controls-tooltip { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="game-layout">
    <div class="sidebar">
        <div style="color:#f44">HP<br><b id="hp" style="font-size:24px">200</b><span style="font-size:12px; opacity:0.6">/200</span></div>
        <div style="color:#0af">FLOOR <b id="floor">1</b></div>
        <div style="font-size:11px; color:#aaa;">ATK: +<span id="atk-bonus">0</span> | DEF: <span id="def-bonus">0</span></div>
        <hr style="width:100%; border:1px solid #444">
        <div class="hot-slot"><img src="icons/sword.png" id="img-sword" style="display:none"></div>
        <div class="hot-slot">
            <div class="durability-bg"><div id="dur-bar" class="durability-fill"></div></div>
            <img src="icons/shield.png" id="img-shield" style="display:none">
        </div>
    </div>

    <div id="stage-container">
        <div id="stage">
            <canvas id="ctx" width="600" height="400"></canvas>
            <div class="overlay-layer">
                <div id="ui-menu" class="ui-panel">
                    <h1 style="color:#0f0; margin-bottom: 5px;">ANOTHER DUNGEON GAME</h1>
                    <p style="color:#ccc; font-style: italic; margin-bottom: 20px;">Just another dungeon game</p>
                    <button id="start-btn">START ADVENTURE</button>
                </div>
                <div id="menu-forge" class="ui-panel" style="display:none;"><h2 style="color:#888;">THE FORGE</h2><div class="shop-grid"><button onclick="buyShield()">FIX SHIELD (2 SCRAP)</button><button onclick="buyArrows()">5 ARROWS (30G)</button><button onclick="closeMenus()">LEAVE</button></div></div>
                <div id="menu-seller" class="ui-panel" style="display:none;"><h2 style="color:#0af;">ARTIFACT SELLER</h2><div class="shop-grid"><button onclick="buyArtifact('atk')">POWER STONE (100G)</button><button onclick="buyArtifact('def')">IRON CHARM (100G)</button><button onclick="closeMenus()">LEAVE</button></div></div>
                <div id="menu-witch" class="ui-panel" style="display:none;"><h2 style="color:#a0f;">THE WITCH</h2><div class="shop-grid"><button onclick="buyHeal()">POTION (40G)</button><button onclick="closeMenus()">LEAVE</button></div></div>
                <div id="menu-buyer" class="ui-panel" style="display:none;"><h2 style="color:#fb0;">SCRAP BUYER</h2><div class="shop-grid"><button onclick="sellScrap()">SELL SCRAP (+25G)</button><button onclick="closeMenus()">LEAVE</button></div></div>
            </div>
        </div>
        <div class="info-bar">
            <div class="info-item" style="color:#aaa;">SCRAP: <b id="bar-scrap">0</b></div>
            <div class="info-item" style="color:#fb0;">GOLD: <b id="bar-gold">0</b></div>
            <div class="info-item">KEY: <b id="bar-key" style="color:#f44;">MISSING</b></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="hot-slot">
            <img src="icons/bow.png" id="img-bow" style="display:none">
            <span id="arrow-count" style="position:absolute; bottom:2px; right:2px; font-size:12px;">0</span>
        </div>
        <div class="hot-slot">
            <img src="icons/heal.png" id="img-heal" style="display:none">
            <span id="heal-count" style="position:absolute; bottom:2px; right:2px; font-size:12px;">0</span>
        </div>
    </div>
</div>

<div id="footer-ui">
    <a href="https://github.com" target="_blank">
        <img src="icons/github.png" class="github-icon" alt="GitHub">
    </a>
    
    <div id="info-trigger">?
        <div id="controls-tooltip">
            <b style="color:#0af">CONTROLS:</b><br><br>
            <b>WASD</b> - Move<br>
            <b>SPACE</b> - Sword<br>
            <b>MOUSE</b> - Aim Bow<br>
            <b>F KEY</b> - Fire Bow<br>
            <b>H KEY</b> - Potion
        </div>
    </div>
</div>

<script>
    document.addEventListener("visibilitychange", () => {
        document.title = document.hidden ? "You've got people to fight" : "Another Dungeon Game";
    });

    const canvas = document.getElementById("ctx");
    const ctx = canvas.getContext("2d");
    const TILE = 40, ROWS = 10, COLS = 15;
    const icons = {};
    const imgList = ['sword', 'shield', 'bow', 'heal', 'gold', 'github'];
    imgList.forEach(n => { icons[n] = new Image(); icons[n].src = `icons/${n}.png`; });

    let gameActive = false, paused = false;
    let floor = 1, gold = 0, scrap = 0, atkBonus = 0, defBonus = 0;
    // Spawn with 200 HP
    let player = { x: 1, y: 1, hp: 200, heals: 1, hasShield: false, shieldDur: 0, arrows: 10, hasKey: false, cooldown: 0 };
    let mousePos = { x: 0, y: 0 };
    let map = [], visited = [], enemies = [], chests = [], npcs = [], projectiles = [], keyPos = {x:-1,y:-1};

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mousePos.x = e.clientX - rect.left;
        mousePos.y = e.clientY - rect.top;
    });

    function initLevel() {
        let valid = false;
        while (!valid) {
            map = []; visited = []; enemies = []; chests = []; npcs = []; projectiles = []; player.hasKey = false;
            const isMarket = floor % 5 === 0;
            for (let y = 0; y < ROWS; y++) {
                map[y] = []; visited[y] = [];
                for (let x = 0; x < COLS; x++) {
                    let edge = (x===0||x===COLS-1||y===0||y===ROWS-1);
                    map[y][x] = (edge || (!isMarket && Math.random()<0.2)) ? 1 : 0;
                    visited[y][x] = false;
                }
            }
            map[1][1] = 0; map[ROWS-2][COLS-2] = 2;
            if (isMarket) {
                player.hasKey = true;
                npcs.push({x: 2, y: 2, type: 'forge', color: '#888'}, {x: 12, y: 2, type: 'seller', color: '#0af'}, 
                          {x: 2, y: 7, type: 'witch', color: '#a0f'}, {x: 12, y: 7, type: 'buyer', color: '#fb0'});
                valid = true;
            } else {
                let kx, ky; do { kx = Math.floor(Math.random()*13)+1; ky = Math.floor(Math.random()*8)+1; } while (map[ky][kx] !== 0);
                keyPos = {x: kx, y: ky};
                if (canReach(1, 1, kx, ky) && canReach(kx, ky, COLS-2, ROWS-2)) {
                    for(let i=0; i<3; i++) { let cx, cy; do { cx = Math.floor(Math.random()*13)+1; cy = Math.floor(Math.random()*8)+1; } while (map[cy][cx] !== 0); chests.push({x: cx, y: cy, type: Math.random()<0.3?'scrap':'gold'}); }
                    for(let i=0; i<floor+1; i++) { let ex, ey; do { ex = Math.floor(Math.random()*10)+4; ey = Math.floor(Math.random()*7)+2; } while (map[ey][ex] !== 0); enemies.push({x: ex, y: ey, hp: 6, maxHp: 6, cooldown: 0, moveCooldown: 0}); }
                    valid = true;
                }
            }
        }
        player.x = 1; player.y = 1;
    }

    function canReach(x1, y1, x2, y2) {
        let queue = [{x: x1, y: y1}];
        let seen = new Set([`${x1},${y1}`]);
        while(queue.length > 0) {
            let {x, y} = queue.shift();
            if (x === x2 && y === y2) return true;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                let nx = x+dx, ny = y+dy;
                if (ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS && map[ny][nx] !== 1 && !seen.has(`${nx},${ny}`)) {
                    seen.add(`${nx},${ny}`); queue.push({x: nx, y: ny});
                }
            });
        }
        return false;
    }

    document.getElementById("start-btn").onclick = () => {
        gameActive = true; floor = 1; gold = 0; scrap = 0;
        // Start adventure with 200 HP
        player = { x:1, y:1, hp: 200, heals: 1, hasShield: false, shieldDur: 0, arrows: 10, hasKey: false, cooldown: 0 };
        document.getElementById("ui-menu").style.display = "none";
        initLevel(); requestAnimationFrame(draw);
    };

    window.onkeydown = e => {
        if (!gameActive || paused) return;
        let nx = player.x, ny = player.y;
        let k = e.key.toLowerCase();
        if (k === 'w') ny--; else if (k === 's') ny++; else if (k === 'a') nx--; else if (k === 'd') nx++;
        else if (k === 'h' && player.heals > 0) { player.heals--; player.hp = Math.min(200, player.hp + 60); }
        else if (k === 'f' && player.arrows > 0 && player.cooldown <= 0) {
            const centerX = player.x * TILE + TILE/2;
            const centerY = player.y * TILE + TILE/2;
            const angle = Math.atan2(mousePos.y - centerY, mousePos.x - centerX);
            projectiles.push({ x: player.x + 0.5, y: player.y + 0.5, vx: Math.cos(angle), vy: Math.sin(angle) });
            player.arrows--; player.cooldown = 0.3;
        } else if (e.key === ' ' && player.cooldown <= 0) {
            enemies.forEach((en, i) => { if (Math.abs(en.x - player.x) <= 1 && Math.abs(en.y - player.y) <= 1) { en.hp -= (2 + atkBonus); if (en.hp <= 0) { enemies.splice(i, 1); gold += 15; } } });
            player.cooldown = 0.5;
        }

        if (map[ny] && map[ny][nx] !== 1) {
            let npc = npcs.find(n => n.x === nx && n.y === ny);
            if (npc) { paused = true; document.getElementById('menu-' + npc.type).style.display = 'flex'; return; }
            let ch = chests.find(c => c.x === nx && c.y === ny);
            if (ch) { if(ch.type === 'scrap') scrap++; else gold += 40; chests = chests.filter(c => c !== ch); }
            if (nx === keyPos.x && ny === keyPos.y) player.hasKey = true;
            player.x = nx; player.y = ny;
        }
        if (map[player.y][player.x] === 2 && player.hasKey) { floor++; initLevel(); }
    };

    function updateEnemies() {
        enemies.forEach(en => {
            if (en.cooldown > 0) en.cooldown -= 0.016;
            if (en.moveCooldown > 0) en.moveCooldown -= 0.016;
            let d = Math.abs(player.x - en.x) + Math.abs(player.y - en.y);
            if (d === 1 && en.cooldown <= 0) {
                let dmg = Math.max(1, 10 - defBonus);
                if (player.hasShield && player.shieldDur > 0) { player.shieldDur--; if(player.shieldDur<=0) player.hasShield=false; }
                else player.hp -= dmg;
                en.cooldown = 1.0; 
            } else if (d < 6 && d > 1 && en.moveCooldown <= 0) {
                let dx = player.x > en.x ? 1 : (player.x < en.x ? -1 : 0);
                let dy = player.y > en.y ? 1 : (player.y < en.y ? -1 : 0);
                if (dx !== 0 && map[en.y][en.x+dx] === 0) { en.x += dx; en.moveCooldown = 0.6; }
                else if (dy !== 0 && map[en.y+dy][en.x] === 0) { en.y += dy; en.moveCooldown = 0.6; }
            }
        });
    }

    function updateProjectiles() {
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i]; p.x += p.vx * 0.25; p.y += p.vy * 0.25;
            if (map[Math.floor(p.y)][Math.floor(p.x)] === 1) { projectiles.splice(i, 1); continue; }
            enemies.forEach((en, ei) => {
                if (Math.abs(p.x - (en.x+0.5)) < 0.4 && Math.abs(p.y - (en.y+0.5)) < 0.4) {
                    en.hp -= (2 + atkBonus); projectiles.splice(i, 1);
                    if (en.hp <= 0) { enemies.splice(ei, 1); gold += 15; if(Math.random()<0.3) scrap++; }
                }
            });
        }
    }

    function buyHeal() { if(gold >= 40) { gold -= 40; player.heals++; } }
    function buyArrows() { if(gold >= 30) { gold -= 30; player.arrows += 5; } }
    function buyShield() { if(scrap >= 2) { scrap -= 2; player.hasShield = true; player.shieldDur = 10; } }
    function buyArtifact(type) { if(gold >= 100) { gold -= 100; if(type==='atk') atkBonus++; else defBonus++; } }
    function sellScrap() { if(scrap >= 1) { scrap -= 1; gold += 25; } }
    function closeMenus() { paused = false; document.querySelectorAll('.ui-panel').forEach(p => { if(p.id !== 'ui-menu') p.style.display = 'none'; }); }

    function draw() {
        if (!gameActive || paused) { if(gameActive) requestAnimationFrame(draw); return; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (player.cooldown > 0) player.cooldown -= 0.016;
        updateEnemies(); updateProjectiles();
        
        for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) if(Math.hypot(x-player.x, y-player.y) < 4) visited[y][x] = true;
        for (let y=0; y<ROWS; y++) for (let x=0; x<COLS; x++) {
            if (visited[y][x]) {
                ctx.fillStyle = map[y][x] === 1 ? "#333" : (map[y][x] === 2 ? (player.hasKey ? "#0af" : "#f00") : (floor%5===0?"#222":"#111"));
                ctx.fillRect(x*TILE, y*TILE, TILE-1, TILE-1);
            }
        }

        ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(player.x * TILE + 20, player.y * TILE + 20);
        ctx.lineTo(mousePos.x, mousePos.y);
        ctx.stroke();
        ctx.setLineDash([]);

        projectiles.forEach(p => { ctx.fillStyle = "#8b4513"; ctx.fillRect(p.x*TILE-4, p.y*TILE-4, 8, 8); });
        chests.forEach(c => { if(visited[c.y][c.x]) { ctx.fillStyle = "#d80"; ctx.fillRect(c.x*TILE+10, c.y*TILE+15, 20, 15); } });
        npcs.forEach(n => { ctx.fillStyle = n.color; ctx.fillRect(n.x*TILE+8, n.y*TILE+8, 24, 24); });
        if(!player.hasKey && visited[keyPos.y][keyPos.x] && floor%5!==0) { ctx.fillStyle = "#fb0"; ctx.beginPath(); ctx.arc(keyPos.x*TILE+20, keyPos.y*TILE+20, 6, 0, 7); ctx.fill(); }
        enemies.forEach(en => {
            if(visited[en.y][en.x]) {
                ctx.fillStyle = en.cooldown > 0 ? "#611" : "#f44"; ctx.fillRect(en.x*TILE+10, en.y*TILE+10, 20, 20);
                for(let i=0; i<en.maxHp; i++) { ctx.fillStyle = i < en.hp ? "#0f0" : "#400"; ctx.fillRect(en.x*TILE+4 + i*5, en.y*TILE-6, 4, 5); }
            }
        });
        ctx.fillStyle = "#0f0"; ctx.fillRect(player.x*TILE+12, player.y*TILE+12, 16, 16);
        
        document.getElementById("hp").innerText = player.hp;
        document.getElementById("floor").innerText = floor;
        document.getElementById("bar-scrap").innerText = scrap;
        document.getElementById("bar-gold").innerText = gold;
        document.getElementById("bar-key").innerText = player.hasKey ? "FOUND" : (floor%5===0 ? "N/A" : "MISSING");
        document.getElementById("bar-key").style.color = (player.hasKey||floor%5===0) ? "#0f0" : "#f44";
        document.getElementById("heal-count").innerText = player.heals;
        document.getElementById("arrow-count").innerText = player.arrows;
        document.getElementById("dur-bar").style.width = (player.shieldDur * 10) + "%";
        document.getElementById("img-shield").style.display = player.hasShield ? "block" : "none";
        document.getElementById("img-sword").style.display = "block";
        document.getElementById("img-bow").style.display = "block";
        document.getElementById("img-heal").style.display = player.heals > 0 ? "block" : "none";
        
        if(player.hp <= 0) { gameActive = false; document.getElementById("ui-menu").style.display="flex"; }
        requestAnimationFrame(draw);
    }
</script>
</body>
</html>
